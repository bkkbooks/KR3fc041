body:
  text: 乘之得一百二十加入右行第一數一得一百二十一為右行第三數又置右行第三數一百二十一以左行第三數一乘之得一百二十一加入右行第二數八得一百二十九為右行第四數又置右行第四數一百二十九以左行第四數一十乘之得一千二百九十加入右行第三數一百二十一得一千四百一十一為右行第五數又置右行第五數一千四百一十一以左行第五數二乘之得二千八百二十二加入右行第四數一百二十九得二千九百五十一為右行第六數又置右行第六數二千九百五十一以左行第六數一乘之得二千九百五十一加入右行第五數一千四百一十一得四千三百六十二為右行第七數即因數得等數二因數四千三百六十二蔀數一十萬七千六百三十九
