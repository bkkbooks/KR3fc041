body:
  text: 十四去之餘二千二百四十三為乘元限數以乘氣元率四萬三千八百得九千八百二十四萬三千四百為朔積年以入元歲八千四十加之得九千八百二十五萬一千四百四十為上元己亥距至元辛巳後已亥積年減一十八年餘九千八百二十五萬一千四百二十二即上元己亥距至元十八年辛巳積算也合問江寧顧晴崖家刻
