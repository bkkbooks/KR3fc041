body:
  text: 百一十加入右行第七數一千五百八十七得三萬七千一百九十七爲右行第九數卽因數得等數一因數三萬七千一百九十七蔀數三萬九千五百七十一乃置閏縮五十以等數一約之仍得五十以因數三萬七千一百九十七乘之得一百八十五萬九千八百五十滿蔀數三萬九千五百七十一去之餘一十三爲乘元限數以乘氣元率二萬一百得二十六萬一千三百爲朔積年以入元歲八千五百八十加之得二十六萬九千八百八十卽上元甲子至麟德元年甲子積算也合問今有唐大衍術日法三千四十歲實一百一十一萬三
