body:
  text: 百四十三朔實八萬九千七百七十三實測到開元十二年甲子歲天正冬至日辰戊寅小餘二千二百六十閏餘四萬九千一百七欲以甲子歲天正十一月甲子夜半合朔冬至為上元問上元距開元十二年積算幾何答曰積九千六百九十六萬一千七百四十算草曰置歲實以日法除去之餘七百四十三為斗分以日法斗分求得等率一即以斗分七百四十三為奇率以日法三千四十為蔀率依大衍求一術求因率列奇率七百四十三於上蔀率三千四十於下以上七百四十三除下三千四十得四為第一數下餘六十八又以下六十八除上七百四十三得一十為第二數上餘六十三又以上六十三除下六十八得一為第三數下餘五又以下五除上六十三得一十二為第四數上餘三又以上三除下五得一為第五數下餘二又以下二除上三得一為第六數上餘一止不除得第一數四第二數一十第三數一第四數一十二第五數一第六數一第七數一列左行立天元一為右行第一數以左行第一數四乘之得四為
