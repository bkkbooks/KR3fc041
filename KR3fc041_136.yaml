body:
  text: 十加入小餘二千二百六十得四萬四千八百二十為開元十二年甲子氣應今欲令上元起甲子歲即從是年演之置氣應四萬四千八百二十以等率一乘紀法六十仍得六十為約率約之得七百四十七以因率一千二百七乘之得九十萬一千六百二十九滿蔀率三千四十去之餘一千七百八十九以紀法六十乘之得一十萬七千三百四十為入元歲又置蔀率三千四十以紀法六十乘之得一十八萬二千四百為氣元率置入元歲一十萬七千三百四十以朔實除去歲實餘三萬三千六十七為歲閏乘之得三十五億四千九百四十一萬一千七百八十滿朔實八萬九千七百七十三去之餘五萬六千六百七十九為入閏置閏應四萬九千一百七即閏餘加入朔實得一十三萬八千八百八十以入閏減之餘八萬二千二百一為閏縮又置氣元率一十八萬二千四百以歲閏乘之得六十億三千一百四十二萬八百滿朔實去之餘二萬一千七百九十五為元閏
