body:
  text: 第三數又置右行第三數二以左行第三數四乘之得八加入右行第二數一得九為右行第四數又置右行第四數九以左行第四數二乘之得一十八加入右行第三數二得二十為右行第五數又置右行第五數二十以左行第五數四乘之得八十加入右行第四數九得八十九為右行第六數又置右行第六數八十九以左行第六數三乘之得二百六十七加入右行第五數二十得二百八十七為右行第七數又置右行第七數二百八十七以左行第七數三乘之得八百六十一加入右行第六數八十九得九百五十為右行第八數又置右行第八數九百五十以左行第八數一乘之得九百五十加入右行第七數二百八十七得一千二百三十七為右行第九數即金乘率次求水置水奇數五百七於上水定母一千八百八十九於下以上五百七除下一千八百八十九得三為第一數下餘三百六十八又以下三百六十八除
