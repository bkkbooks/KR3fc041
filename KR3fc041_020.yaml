body:
  text: 草曰以甲數八乘乙數五得四十又以丙數二十七乘之得一千八十即衍母也以乙數五乘丙數二十七得一百三十五即甲衍數也以甲數八乘丙數二十七得二百一十六即乙衍數也以甲數八乘乙數五得四十即丙衍數也合問其一草曰置衍母一千八十為三位以甲數八除之得一百三十五以乙數五除之得二百一十六以丙數二十七除之得四十並與前同合問今有甲數三乙數五丙數七丁數十一問衍母衍數各幾何答曰衍母一千一百五十五甲衍數三百八十五乙衍數二百三十一丙衍數一百六十五丁衍數一百五草曰以甲數三乘乙數五得一十五又以丙數七乘之得一百五又以丁數十一乘之得一千一百五十五即衍母也以乙數五乘丙數七得三十五又以丁數十一乘之得三百八十五即甲衍數也以甲數三乘丙數七得二十一又以丁數十一乘之得二百三十一即乙衍數也以甲數三乘乙數五得一十五又以丁數十一乘之得一百六十五即丙衍數也以甲
