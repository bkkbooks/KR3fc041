body:
  text: 乘率次求金置金奇數二千五百六十六於上金定母四千六百六十一於下以上二千五百六十六除下四千六百六十一得一爲第一數下餘二千九十五又以下二千九十五除上二千五百六十六得一爲第二數上餘四百七十一又以上四百七十一除下二千九十五得四爲第三數下餘二百一十一又以下二百一十一除上四百七十一得二爲第四數上餘四十九又以上四十九除下二百一十一得四爲第五數下餘一十五又以下一十五除上四十九得三爲第六數上餘四又以上四除下一十五得三爲第七數下餘三又以下三除上四得一爲第八數上餘一止不除得第一數一第二數一第三數四第四數二第五數四第六數三第七數三第八數一列左行乃立天元一爲右行第一數以左行第一數一乘之得一爲右行第二數又置右行第二數一以左行第二數一乘之得一加入右行第一數一得二爲右行
