body:
  text: 次求丙置丙奇數六十一於上丙定母七十五於下以上六十一除下七十五得一為第一數下餘一十四又以下一十四除上六十一得四為第二數上餘五又以上五除下一十四得二為第三數下餘四又以下四除上五得一為第四數上餘一即止不除得第一數一第二數四第三數二第四數一列左行乃立天元一為右行第一數以左行第一數一乘之仍得一為右行第二數又置右行第二數一以左行第二數四乘之仍得四加入右行第一數一得五為右行第三數又置右行第三數五以左行第三數二乘之得一十加入右行第二數一得一十一為右行第四數又置右行第四數一十一以左行第四數一乘之仍得一十一加入右行第三數五得一十六為右行第五數即丙乘率置各乘率以乘各衍數以甲乘率七十二乘甲衍數
