body:
  text: 數一十一第三數三第四數一列左行立天元一爲右行第一數以左行第一數四乘之得四爲右行第二數又置右行第二數四以左行第二數一十一乘之得四十四加入右行第一數一得四十五爲右行第三數又置右行第三數四十五以左行第三數三乘之得一百三十五加入右行第二數四得一百三十九爲右行第四數又置右行第四數一百三十九以左行第四數一乘之得一百三十九加入右行第三數四十五得一百八十四爲右行第五數卽因率得等率一十因率一百八十四蔀率一千五十九乃視天正冬至日辰壬辰今欲令上元起甲子日卽爲大餘二十八以日法通大餘得二十九萬六千五百二十加入小餘一千六百八十得二十九萬八千二百爲天聖二年甲子氣應今欲令上元起甲子歲卽從是年演之置氣應二十九萬八千二百以等率一十乘紀法六十得六百爲約率約之得四百九十
