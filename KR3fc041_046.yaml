body:
  text: 列第一數一第二數七於左行立天元一為右行第一數以左行第一數一乘之得一為右行第二數又置右行第二數一以左行第二數七乘之得七加入右行第一數一得八為右行第三數即丙乘率以各乘率各乘衍數甲得一百二十六乙得二百二十五丙得二百八十各為用數乃列元問賸數四為甲位五為乙位一為丙位各以用數乘之甲得五百四乙得一千一百二十五丙得二百八十各為總并三總得一千九百九為總數置總數一千九百九滿衍母三百一十五去之餘一十九即物數也合問
  hash: sha256:fc76e8fe2a555d0622bbde90dd10c69bda86e4168a159fa791670afd01b3a785
