body:
  text: 列第一數一第二數七於左行立天元一爲右行第一數以左行第一數一乘之得一爲右行第二數又置右行第二數一以左行第二數七乘之得七加入右行第一數一得八爲右行第三數卽丙乘率以各乘率各乘衍數甲得一百二十六乙得二百二十五丙得二百八十各爲用數乃列元問賸數四爲甲位五爲乙位一爲丙位各以用數乘之甲得五百四乙得一千一百二十五丙得二百八十各爲總并三總得一千九百九爲總數置總數一千九百九滿衍母三百一十五去之餘一十九卽物數也合問
  hash: sha256:c229f42b198f17a44b9a1d7e1f37b434a13ca40589e07dfba161e147ef7f3428
