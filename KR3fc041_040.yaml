body:
  text: 一十六丙乘率三乘丙衍數三得九各為用數乃列元問賸數五一為乙丙二位四四所賸一當為甲位亦棄不用各乘用數乙賸數五乘乙用數一十六得八十丙賸數一乘丙用數九仍得九各為總併各總得八十九為總數置總數以衍母二十四除去之餘一十七即物數也合問今有物不知其數五五數之賸四七七數之賸五九九數之賸一問物幾何答曰一十九草曰列元問全數五為甲位七為乙位九為丙位依連環相約術約之以甲五與乙七丙九相約求等又以乙七與丙九求等皆得一不約即以甲五乙七丙九各為定母
