body:
  text: 得五以約巽五得一以乘兌八十得四百得乾一坎一艮一震一巽一離三坤七兌四百各爲定母定母單一者皆減去不用但置離三坤七兌四百爲三位用連環相乘術求衍母衍數以離三乘坤七得二十一又以兌四百乘之得八千四百爲衍母又以坤七乘兌四百得二千八百爲離衍數又以離三乘兌四百得一千二百爲坤衍數又以離三乘坤七得二十一爲兌衍數置各衍數以各定母去之得離一坤三兌二十一各爲奇數用大衍求一術求乘率先求坤乘率離奇數一卽爲乘率置坤奇數三於上坤定母七於下以上三除下七得二爲第一數下餘一又以下一除上三得二爲第二數上餘一卽止不除得第一數二第二數二列左行乃立天元一爲右行第一數以左行第一數二乘之仍得
  hash: sha256:7f4bd39e3bddeced8137bfacf4a731290679098cb481375b5b956346c5c0ece7
