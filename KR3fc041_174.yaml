body:
  text: 次置朔實二十九萬五千三百五分九十三秒以日法乘之得六億四千六百七十一萬九千九百八十六分七十秒以日周除之得六萬四千六百七十一不盡九千九百八十六分七十秒亦得一共得六萬四千六百七十二爲今用朔實置歲實七十九萬九千八百八十一滿朔實六萬四千六百七十二去之餘二萬三千八百一十七爲歲閏置入元歲八千四十以歲閏乘之得一億九千一百四十八萬八千六百八十滿朔實六萬四千六百七十二去之餘五萬九千五百六十爲入閏又置閏應二十日一千八百五十三分以日法乘之得四億四千二百五萬八千八十七以日周除之得四萬四千二百五不盡八千七十亦得一共得四萬四千二百六爲今用至元辛巳歲閏應又置辛巳距己亥一十八年以歲閏乘之得四十三萬八千七百六加入辛巳閏應四萬四千二百六得四十七萬二千九百一十二滿朔實六萬四千六百七十二去之餘二萬八百八爲至元辛巳後己亥歲閏應置閏應二萬二百八加朔實六萬四
