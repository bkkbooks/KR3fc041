body:
  text: 陽城張敦仁重述求等兩數本不等輾轉相消而等以等除不等兩數必適盡術曰多為實少為法實滿法去之不計除得之數故曰去之不盡以法為實實為法復除去之實盡則法為等數此出九章約分術所除去者皆等數之重疊者也今有多數二十一少數一十五問等數幾何答曰三以等數三除多數二十一得七除少數一十五得五皆適盡它放此草曰置二十一於上一十五於下以下一十五除去上二十一上餘六又以上六除去下一十五下餘三又以下三除去上六適盡則下三為等數合問今有多數一十八少數三問等數幾何答曰三草曰置一十八於上三於下以下三除去上一十八適盡則下三為等數合問
  hash: sha256:38958f57917db56f02a3d61c5e1bf315ca58d8b7136131eac551f66f2567ce21
