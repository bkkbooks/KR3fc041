body:
  text: 今有宋崇天術日法一萬五百九十歲實三百八十六萬七千九百四十朔實三十一萬二千七百二十九實測到天聖二年甲子天正冬至日辰壬辰小餘一千六百八十閏餘一萬六千一百四十九欲以甲子歲天正十一月甲子夜半合朔冬至爲上元問上元距天聖二年積算幾何答曰積九千七百五十五萬六千三百四十算草曰置歲實以日法除去之餘二千五百九十爲斗分以日法斗分求得等率一十以約日法得一千五十九爲蔀率以約斗分得二百五十九爲奇率依大衍求一術求因率列奇率二百五十九於上蔀率一千五十九於下以上二百五十九除下一千五十九得四爲第一數下餘二十三又以下二十三除上二百五十九得一十一爲第二數上餘六又以上六除下二十三得三爲第三數下餘五又以下五除上六得一爲第四數上餘一卽止不除得第一數四第二
