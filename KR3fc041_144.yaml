body:
  text: 今有宋崇天術日法一萬五百九十歲實三百八十六萬七千九百四十朔實三十一萬二千七百二十九實測到天聖二年甲子天正冬至日辰壬辰小餘一千六百八十閏餘一萬六千一百四十九欲以甲子歲天正十一月甲子夜半合朔冬至為上元問上元距天聖二年積算幾何答曰積九千七百五十五萬六千三百四十算草曰置歲實以日法除去之餘二千五百九十為斗分以日法斗分求得等率一十以約日法得一千五十九為蔀率以約斗分得二百五十九為奇率依大衍求一術求因率列奇率二百五十九於上蔀率一千五十九於下以上二百五十九除下一千五十九得四為第一數下餘二十三又以下二十三除上二百五十九得一十一為第二數上餘六又以上六除下二十三得三為第三數下餘五又以下五除上六得一為第四數上餘一即止不除得第一數四第二
