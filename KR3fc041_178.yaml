body:
  text: 為第七數下餘四又以下四除上一十一得二為第八數上餘三又以上三除下四得一為第九數下餘一又以下一除上三得二為第十數上餘一得第一數二第二數一第三數一第四數三第五數一第六數一第七數一十七第八數二第九數一第十數二列左行立天元一為右行第一數以左行第一數二乘之得二為右行第二數又置右行第二數二以左行第二數一乘之得二加入右行第一數一得三為右行第三數又置右行第三數三以左行第三數一乘之得三加入右行第二數二得五為右行第四數又置右行第四數五以左行第四數三乘之得一十五加入右行第三數三得一十八為右行第五數又置右行第五數一十八以左行第五數一乘之得一十八加入右行第四數五得二十三為右行第六數又置右行第六數二十三以左行第六數一乘之得二十三加入右行第五數一十八得四十一為右行第七數又置右行第七數四十一以左行第七數一十七乘之得六百九十七加入右行第六數二十三得七百二十為右行第八數又置右行第八數七百二十以左行第八數二乘之得一千四百四十加入
