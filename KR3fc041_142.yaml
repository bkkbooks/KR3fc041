body:
  text: 得三萬三千八百二十五為右行第十數又置右行第十數三萬三千八百二十五以左行第十數一乘之得三萬三千八百二十五加入右行第九數二萬二千一百二十三得五萬五千九百四十八為右行第十一數即因數得等數一因數五萬五千九百四十八蔀數八萬九千七百七十三乃置閏縮八萬二千二百一以等數一約之仍得八萬二千二百一以因數五萬五千九百四十八乘之得四十五億九千八百九十八萬一千五百四十八滿蔀數八萬九千七百七十三去之餘五百三十一為乘元限數以乘氣元率一十八萬二千四百得九千六百八十五萬四千四百為朔積年以入元歲一十萬七千三百四十加之得九千六百九十六萬一千七百四十即上元甲子至開元十二年甲子積算也合問
