body:
  text: 六又以上一十六除下一十七得一為第七數下餘一又以下一除上一十六得一十五為第八數上餘一得第一數一第二數五第三數一第四數一第五數六十第六數二第七數一第八數一十五列左行立天元一為右行第一數以左行第一數一乘之得一為右行第二數又置右行第二數一以左行第二數五乘之得五加入右行第一數一得六為右行第三數又置右行第三數六以左行第三數一乘之得六加入右行第二數一得七為右行第四數又置右行第四數七以左行第四數一乘之得七加入右行第三數六得一十三為右行第五數又置右行第五數一十三以左行第五數六十乘之得七百八十加入右行第四數七得七百八十七為右行第六數又置右行第六數七百八十七以左行第六數二乘之得一千五百七十四加入右行第五數一十三得一千五百八十七為右行第七數又置右行第七數一千五百八十七以左行第七數一乘之得一千五百八十七加入右行第六數七百八十七得二千三百七十四為右行第八數又置右行第八數二千三百七十四以左行第八數一十五乘之得三萬五千六
