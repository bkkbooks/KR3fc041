body:
  text: 以下五除上二十六得五為第二數上餘一即止不除得第一數一第二數五列左行乃立天元一為右行第一數以左行第一數一乘之仍得一為右行第二數又置右行第二數一以左行第二數五乘之得五加入右行第一數一得六為右行第三數即永乘率次求盈置盈奇數二百六十七於上盈定母四百四十八於下以上二百六十七除下四百四十八得一為第一數下餘一百八十一又以下一百八十一除上二百六十七得一為第二數上餘八十六又以上八十六除下一百八十一得二為第三數下餘九又以下九除上八十六得九為第三數上餘五又以上五除下九得一為第五數下餘四又以下四除上五得一為第六數上餘一即止不除得第一數一第二數一第三數二第四數九第五數一第六數一列左行乃立天元一為右行第一數以左行第一數一乘之得一為右行第二數又置右行第二數一以左行第二數一乘之得一加入右行第一數一得二為右
