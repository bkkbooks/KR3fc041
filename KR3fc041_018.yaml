body:
  text: 二為第一變又以乙一十三與丙三十二求等得一不約此第一變即為第二變問數止三位即為泛母又視甲七與乙一十三與丙三十二又乙一十三與丙三十二皆無等此泛母即為定母合問今有甲數一十一乙數九丙數四問定母各幾何答曰甲一十一乙九丙四無等即以問數為定母草曰以甲一十一與乙九求等得一又以甲一十一與丙四求等得一皆不約又以乙九與丙四求等得一亦不約則甲一十一乙九丙四即為定母合問連環相乘術曰列各問數纍相乘所得即衍母也如甲乙丙三位以甲乘乙得數又以丙乘之即得術母四位以上放此列各問數存一位餘纍相乘所得即所存位之衍數也如甲乙丙三位存甲一位以乙丙兩位相乘所得為甲衍數餘放此其一術曰置衍母依位數副之如有甲乙丙三位即副置衍母三位四位巳上放此以各問數除之即各得衍數也如以甲除衍母所得為甲衍數此餘放今有甲數八乙數五丙數二十七問衍母衍數各幾何答曰衍母一千八十甲衍數一百三十五乙衍數二百一十六丙衍數四十
