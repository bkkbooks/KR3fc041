body:
  text: 德元年甲子歲天正冬至日辰甲子小餘二百四十閏餘一萬七千七百七十欲以甲子歲天正十一月甲子夜半合朔冬至為上元問上元距麟德元年歲積幾何答曰積二十六萬九千八百八十算草曰置歲實以日法除去之餘三百二十八為斗分以日法斗分求得等率四以約日法一千三百四十得三百三十五為蔀率以約斗分三百二十八得八十二為奇率次以大衍求一術求因率置蔀率三百三十五於下奇率八十二於上以上八十二除下三百三十五得四為第一數下餘七又以下七除上八十二得一十一為第二數上餘五又以上五除下七得一為第三數下餘二又以下二除上五得二為第四數上餘一即止不除第一數四第二數一十一第三數一第四數二列左行立天元一為右行第一數以左行第一數四乘之得四為右行第二數又置右行第二數四以左行第二數一十一乘之得四十四加入右行第一數一得四十五為右行第三數又置右行第三數四十五以左行第三數一乘之得四十五加入右行第二數四得四十九為右行第四數又置右行第四數四十九以左行第四數二乘之得九
