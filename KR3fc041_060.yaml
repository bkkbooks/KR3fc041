body:
  text: 十八次餘十九兩以震每次支銀四十兩除之得一百七十一次餘十九兩以巽每次支銀五十兩除之得一百三十七次餘九兩以離每次支銀六十兩除之得一百一十四次餘十九兩以坤每次支銀七十兩除之得九十七次餘六十九兩以兌每次支銀八十兩除之得八十五次餘五十九兩合問今有江寧府差人進京先差甲次差乙次差丙各於差日黎明起行甲日行一百七十八里乙日行二百二十四里丙日行三百里甲乙丙三人同於本月十五日到京其十四日抵暮宿店各離京遠近不等甲宿處離京五十八里乙宿處離京八十六里丙宿處離京一百五十里問江寧府距京師里數并甲乙丙每人所行日數及於何日自江寧起行答曰江寧距京師二千五百五十里甲行十四日八十九分日之二十九於初一日起行乙行十一日一百一十二分日之四十三於初四日起行
  hash: sha256:d8ded9f88d255594fdc2950234566de90baac87102eb5e376bd97913a88ef151
