body:
  text: 行第三數又置右行第三數二以左行第三數二乘之得四加入右行第二數一得五爲右行第四數又置右行第四數五以左行第四數九乘之得四十五加入右行第三數二得四十七爲右行第五數又置右行第五數四十七以左行第五數一乘之得四十七加入右行第四數五得五十二爲右行第六數又置右行第六數五十二以左行第六數一乘之得五十二加入右行第五數四十七得九十九爲右行第七數卽盈乘率置各乘率以乘各衍數以和乘率二百一十七乘和衍數三百八十四萬六千九百七十六得八億三千四百七十九萬三千七百九十二爲和用數以豐乘率五十八乘豐衍數八百一萬三千三百七十六得四億六千四百七十七萬五千八百八爲豐用數以永乘率六乘永衍數七千一百六十萬三千三百九十二得四億二千九百六十二萬三百五十二爲永用數以盈乘率九十九乘盈衍數四百九十五萬四
