body:
  text: 三得七十四為右行第八數又置右行第八數七十四以左行第八數五乘之得三百七十加入右行第七數五十一得四百二十一為右行第九數又置右行第九數四百二十一以左行第九數一乘之得四百二十一加入右行第八數七十四得四百九十五為右行第十數又置右行第十數四百九十五以左行第十數一乘之得四百九十五加入右行第九數四百二十一得九百一十六為右行第十一數又置右行第十一數九百一十六以左行第十一數一乘之得九百一十六加入右行第十數四百九十五得一千四百一十一為右行第十二數又置右行第十二數一千四百一十一以左行第十二數二乘之得二千八百二十二加入右行第十一數九百一十六得三千七百三十八為右行第十三數又置右行第十三數三千七百三十八以左行第十三數五乘之得一萬八千六百九十加入右行第十二數一千四百一十一得二萬一百一為右行第十四數又置右行第十四數二萬一百一以左行第十四數四乘之得八萬四百四加入右行第十三數三千七百三十八得八萬四千一百四十二為右行第十五數即因
