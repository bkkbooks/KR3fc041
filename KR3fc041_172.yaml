body:
  text: 乃置氣應五十五日六百二分以日法乘之得一十二億五百八十一萬八千三百八十以日周除之得一十二萬五百八十一不盡八千三百八十亦得一共得一十二萬五百八十二為今用至元辛巳氣應今欲令上元起已亥歲已亥在辛巳後一十八年置一十八年以歲實七十九萬九千八百八十一乘之得一千四百三十九萬七千八百五十八加入辛巳氣應一十二萬五百八十二得一千四百五十一萬八千四百四十以日法除之得六千六百二十九為積日不盡九百三十為小餘以紀法六十去積日餘二十九為大餘復以日法通之得六萬三千五百一十加入小餘九百三十得六萬四千四百四十為至元辛巳後已亥歲氣應乃從是歲演之置氣應六萬四千四百四十以等率三乘紀法六十得一百八十為約率約之得三百五十八以因率三十三乘之得一萬一千八百一十四滿蔀率七百三十去之餘一百三十四以紀法六十乘之得八千四十為入元歲又置蔀率七百三十以紀法六十乘之得四萬三千八百為氣元率
