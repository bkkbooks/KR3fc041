body:
  text: 以丙七十五除之得一萬九千九百三十六爲丙衍數置各衍數各以定母去之得甲六十八乙一百七十九丙六十一各爲奇數用大衍求一術求乘率先求甲置甲奇數六十八於上甲定母八十九於下以上六十八除下八十九得一爲第一數下餘二十一又以下二十一除上六十八得三爲第二數上餘五又以上五除下二十一得四爲第三數下餘一又以下一除上五得四爲第四數上餘一卽止不除得第一數一第二數三第三數四第四數四列左行乃立天元一爲右行第一數以左行第一數一乘之得一爲右行第二數又置右行第二數一以左行第二數三乘之仍得三加入右行第一數一得四爲右行第三數又置右行第三數四以左行第三數四乘之得一十六加入右行第二數
