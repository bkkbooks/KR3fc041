body:
  text: 陽城張敦仁重述演紀唐麟德術以後元授時術以前皆用此術推求上元積算卷中擧麟德大衍崇天紀元四術及授時附演一法爲例餘可類推術曰以日法斗分求得等率以約日法得蔀率以約斗分得奇率以蔀率奇率用求一術求得因率以等率乘紀法六十所得爲約率以約氣應所得以因率乘之蔀率去之餘以紀法六十乘之得入元歲又以紀法六十乘蔀率得氣元率此氣元率爲氣分歲名日名俱終之數又置入元歲以歲閏乘之滿朔實去之餘爲入閏此入閏爲入元歲應有之閏餘以減閏應不足減加朔實而減之餘爲閏縮此閏朔爲今所求入元歲初年之閏餘又置氣元率以歲閏乘之滿朔實去之餘爲元閏此元閏爲氣元率應有之閏餘以朔實元閏求得等數以約朔實得蔀數以約元閏得奇數以蔀數奇數用求一術求得因數以等數約閏縮所得以因數乘之滿蔀數去之餘爲乘元限數以乘氣元率所得爲朔積年以入元歲加之卽得上元以來所求積算也今有唐麟德術日法一千三百四十歲實四十八萬九千四百二十八朔實三萬九千五百七十一實測到麟
