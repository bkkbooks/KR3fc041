body:
  text: 十八加入右行第三數四十五得一百四十三為右行第五數即因率得等率四因率一百四十三蔀率三百三十五乃視天正冬至日辰甲子今欲令上元起甲子日即為無大餘小餘二百四十即為麟德元年甲子氣應又欲令上元起甲子歲即從是年演之置氣應二百四十以等率四乘紀法六十得二百四十為約率約之得一以因率乘之得一百四十三不滿蔀率即以紀法六十乘之得八千五百八十為入元歲又置蔀率三百三十五以紀法六十乘之得二萬一百為氣元率置入元歲八千五百八十以朔實除去歲實餘一萬四千五百七十六為歲閏乘之得一億二千五百六
