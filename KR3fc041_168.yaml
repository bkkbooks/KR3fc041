body:
  text: 乃置閏縮一十三萬三千五十六以等數二約之得六萬六千五百二十八以因數四千三百六十二乘之得二億九千一十九萬五千一百三十六滿蔀數一十萬七千六百三十九去之餘三百九十二爲乘元限數以乘氣元率七萬二千九百得二千八百五十七萬六千八百爲朔積年以入元歲三萬六千六百六十加之得二千八百六十一萬三千四百六十卽上元庚辰至元符三年庚辰積算也合問今有元授時術不用積年日法日周一萬歲實三百六十五萬二千四百二十五分朔實二十九萬五千三百五分九十三秒今欲仍用積年日法定至元十八年辛巳歲天正冬至氣應五十五日六百二分閏應二十日一千八百五十三分調得日法二千一百九十以己亥歲天正十一月甲子夜半冬至合朔爲上元問上元距至元十八年積算幾何答曰積九千八百二十五萬一千四百二十二算草曰置歲實三百六十五萬二千四百二十五分以
