body:
  text: 乃置離庫餘十九兩坤庫餘六十九兩兌庫餘五十九兩各為賸數置各賸數各以用數乘之離用數二千八百以乘離賸數十九得五萬三千二百為離總坤用數六千以乘坤賸數六十九得四十一萬四千為坤總兌用數八千一以乘兌賸數五十九得四十七萬二千五十九為兌總并各總得九十三萬九千二百五十九為總數置總數九十三萬九千二百五十九滿衍母八千四百去之餘六千八百五十九即各庫貯銀兩數副置八位以乾每次支銀一十兩除之得六百八十五次餘九兩以坎每次支銀二十兩除之得三百四十二次餘十九兩以艮每次支銀三十兩除之得二百二
