body:
  text: 七除下五百七十七得四為第一數下餘一百九又以下一百九除上一百一十七得一為第二變上餘八又以上八除下一百九得一十三為第三數下餘五又以下五除上八得一為第四數上餘三又以上三除下五得一為第五數下餘二又以下二除上三得一為第六數上餘一即止不除得第一數四第二數一第三數一十三第四數一第五數一第六數一列左行乃立天元一為右行第一數以左行第一數四乘之仍得四為右行第二數又置右行第二數四以左行第二數一乘之仍得四加入右行第一數一得五為右行第三數又置右行第三數五以左行第三數一十三乘之得六十五加入右行第二數四得六十九為右行第四數又置右行第四數六十九以左行第四數一乘之仍得六十九加入右行第三數五得七十四為右行第五數又置右行第五數七十四以左行第五數一乘之仍得七十四加入右行第四數六十九得一百四十三為右行第六數又置右行第六數一百四十三以左行第六數一乘之仍得一百四十三加入右行第五數七十四得二百一十七為右行第七數即和乘率
