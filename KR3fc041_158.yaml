body:
  text: 今有宋紀元術日法七千二百九十歲實二百六十六萬二千六百二十六朔實二十一萬五千二百七十八實測到元符三年庚辰天正冬至日辰庚午小餘一千一百七十閏餘五千六百二十二欲以庚辰歲天正十一月已卯夜半合朔冬至為上元問上元至元符三年積算幾何答曰積二千八百六十一萬三千四百六十算草曰置歲實以日法除去之餘一千七百七十六為斗分以日法斗分求得等率六以約斗分得二百九十六為奇率以約日法得一千二百一十五為蔀率依大衍求一術求因率列奇率二百九十六於上蔀率一千二百一十五於下以上二百九十六除下一千二百一十五得四為第一數下餘三十一又以下三十一除上二百九十六得九為第二數上餘一十七又以上一十七除下三十一得一為第三數下餘一十四又以下一十四除上一十七得一為第四數上餘三又以上三除下一十四得四為第五數下餘二又以下二除上三得一為第六數上餘一止不除得第一數四第二數九第三數一第四數一第五數
