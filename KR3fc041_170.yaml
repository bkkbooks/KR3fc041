body:
  text: 日法二千一百九十乘之得七十九億九千八百八十一萬七百五十以日周一萬除之得七十九萬九千八百八十一為今用歲實不盡七百五十棄之置歲實七十九萬九千八百八十一滿日法二千一百九十去之餘五百三十一為斗分以日法斗分求得等率三以約日法得七百三十為蔀率以約斗分得一百七十七為奇率依大衍求一術求因率列奇率一百七十七於上蔀率七百三十於下以上一百七十七除下七百三十得四為第一數下餘二十二又以下二十二除上一百七十七得八為第二數上餘一即止不除得第一數四第二數八列左行立天元一為右行第一數以左行第一數四乘之得四為右行第二數又置右行第二數四以左行第二數八乘之得三十二加入右行第一數一得三十三為右行第三數即因率得等率三因率三十三蔀率七百三十
  hash: sha256:1c03ab5bdaf08ccbc2e2e6aea41cbdcc3a88544ca977dca414884f6423e6702f
