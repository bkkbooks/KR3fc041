body:
  text: 今有多數二十五奇少數一十偶等數五奇問當約何數乘何數答曰當約一十得二偶乘二十五得一百二十五奇今有多數六偶少數四偶等數二偶問當約何數乘何數答曰當約六得三奇乘四得八偶連環相約術曰置各問數識其位如甲乙丙丁之類自上而下列之先以上位與下諸位各求等依約分術約一存一為第一變若上位當約即以既約之數與下諸位求等後皆放此又以次位與下諸位各求等約之為第二變每自上而下以一位與下諸位各求等約之為一變凡問數有三位則有二變有四位則有三變每多一位則多一變訖各為泛母復置泛母如前自上而下求等依再約術約一乘一為一變訖各為定母若各問數俱無等即以各問數為定母若泛母俱無等即以泛母為定母案秦氏元法問數有元數收數通數復數之別其復數條有求總等一法今驗求總等於算未密如程行相及問衍母當三千緣求總等誤作六千故此術定以約分求泛母再約求定母較元法為省約而無弊今有甲數二十四乙數三十丙數五十四問定母各幾
