body:
  text: 第七數又置右行第七數四十一以左行第七數五乘之得二百五加入右行第六數二十六得二百三十一為右行第八數又置右行第八數二百三十一以左行第八數七乘之得一千六百一十七加入右行第七數四十一得一千六百五十八為右行第九數即水乘率各置乘率各以乘衍數木得二千四百四十八萬二千四十九億六千一百五十八萬八千八百七十六火得一千四十七萬一千四百八十八億三千四百四十九萬二千一百二十五土得二千七十三萬七千七百一億一千六百七十萬二千二百金得七百九十五萬九千五百八十七億一千九百四萬七千一百水得二千六百三十二萬四千三十八億四千二百二十四萬八千六百各為用數
