body:
  text: 以元閏朔實求得等數一卽以元閏爲奇數朔實爲蔀數依大衍求一術求因數列奇數二萬一千七百九十五於上蔀數八萬九千七百七十三於下以上二萬一千七百九十五除下八萬九千七百七十三得四爲第一數下餘二千五百九十三又以下二千五百九十三除上二萬一千七百九十五得八爲第二數上餘一千五十一又以上一千五十一除下二千五百九十三得二爲第三數下餘四百九十一又以下四百九十一除上一千五十一得二爲第四數上餘六十九又以上六十九除下四百九十一得七爲第五數下餘八又以下八除上六十九得八爲第六數上餘五又以上五除下八得一爲第七數下餘三又以下三除上五得一爲第八數上餘二又以上二除下三得一爲第九數下餘一又以下一除上二得一爲第十數上餘一得第一數四第二數八第三數二第四數二第五數七第六數八第七數一第八數一第九數一第十數一列左行立天元一爲右行第一數以左行第一數四乘之得四爲右行第二數
