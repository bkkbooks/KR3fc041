body:
  text: 數答曰當約一十得二偶此亦反約法也若約二十五得五則五與一十仍有等今約一十得二即二與二十五為無等今有多數六偶少數四偶等數二偶問當約何數答曰當約六得三奇再約既約之後仍有等數即須再約術曰置兩數此既約後之數以等數約一數乘一數既約不可再約今約一乘一猶之未約也辨奇偶如上法謂兩奇則如意約之之類今有多數二十一奇少數一十五奇等數三奇問當約何數乘何數答曰約二十一得七奇乘一十五得四十五奇或約一十五得五奇乘二十一得六十三奇俱可今有多數九奇少數三奇等數三奇問當約何數乘何數答曰當約三得一奇乘九得二十七奇今有多數二十四偶少數二十一奇等數三奇問當約何數乘何數答曰當約二十一得七奇乘二十四得七十二偶
