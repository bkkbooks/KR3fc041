body:
  text: 求一此總術也術曰置元問各全數依連環相約術求得各定母復置各定母若定母為一即減去此位不用依連環相乘術求得衍母及衍數置各衍數各以定母去之餘為各奇數各置奇數定母奇數一者即以衍數為用數不求乘率依大衍求一術求得各乘率復置各衍數以各乘率乘之得各用數乃置元問各賸數各以用數乘之為各總以各總并之為總數滿衍母去之餘即所求數也今有物不知其數三三數之賸二五五數之賸三七七數之賸二問物幾何此問出孫子算經為求一術之原本故首列之答曰二十三草曰置元問全數三五七列甲乙丙三位依連環相約術約之先以甲三與乙五相約無等次以甲三與丙七相約亦無等又以乙五與丙七相約亦無等即以各全數為各定母又依連環相乘術求衍母衍數以甲定母三乘乙定
