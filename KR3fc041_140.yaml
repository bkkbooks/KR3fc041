body:
  text: 又置右行第二數四以左行第二數八乘之得三十二加入右行第一數一得三十三為右行第三數又置右行第三數三十三以左行第三數二乘之得六十六加入右行第二數四得七十為右行第四數又置右行第四數七十以左行第四數二乘之得一百四十加入右行第三數三十三得一百七十三為右行第五數又置右行第五數一百七十三以左行第五數七乘之得一千二百一十一加入右行第四數七十得一千二百八十一為右行第六數又置右第六數一千二百八十一以左行第六數八乘之得萬二百四十八加入右行第五數一百七十三得一萬四百二十一為右行第七數又置右行第七數一萬四百二十一以左行第七數一乘之得一萬四百二十一加入右行第六數一千二百八十一得一萬一千七百二為右行第八數又置右行第八數一萬一千七百二以左行第八數一乘之得一萬一千七百二加入右行第七數一萬四百二十一得二萬二千一百二十三為右行第九數又置右行第九數二萬二千一百二十三以左行第九數一乘之得二萬二千一百二十三加入右行第八數一萬一千七百二
