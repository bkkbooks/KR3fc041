body:
  text: 得四為右行第二數又置右行第二數四以左行第二數一乘之仍得四加入右行第一數一得五為右行第三數又置右行第三數五以左行第三數一乘之仍得五加入右行第二數四得九為第四數又置右行第四數九以左行第四數一乘之仍得九加入右行第三數五得一十四為右行第五數即乘率合問今有少數一百多數一百一問乘率幾何答曰一百以乘率一百乘少數一百得一萬滿多數一百一去之餘一草曰列一百於上一百一於下以上一百除下一百一得一為第一數下餘一又以下一除上一百得九十九為第二數上餘一即止不除得第一數一第二數九十九列左行乃立天元一為右行第一數以左行第一數一乘之仍得一為右行第二數又置右行第二數一以左行第二數九十九乘之仍得九十九如入右行第一數一得一百為右行第三數即乘率合問
