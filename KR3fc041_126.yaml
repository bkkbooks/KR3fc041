body:
  text: 萬二千八十滿朔實三萬九千五百七十一去之餘一萬七千七百二十為入閏置閏應一萬七千七百七十即閏餘以入閏減之餘五十為閏縮又置氣元率二萬一百以歲閏乘之得二億九千二百九十七萬七千六百滿朔實去之餘三萬三千四百八十七為元閏以元閏朔實求得等數一即以元閏三萬三千四百八十七為奇數朔實三萬九千五百七十一為蔀數依大衍求一術求因數列奇數三萬三千四百八十七於上蔀數三萬九千五百七十一於下以上三萬三千四百八十七除下三萬九千五百七十一得一為第一數下餘六千八十四又以下六千八十四除上三萬三千四百八十七得五為第二數上餘三千六十七又以上三千六十七除下六千八十四得一為第三數下餘三千一十七又以下三千一十七除上三千六十七得一為第四數上餘五十又以上五十除下三千一十七得六十為第五數下餘一十七又以下一十七除上五十得二為第六數上餘一十
