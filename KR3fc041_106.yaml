body:
  text: 次求土置土奇數一百七十五於上土定母二百六十九於下以上一百七十五除下二百六十九得一為第一數下餘九十四又以下九十四除上一百七十五得一為第二數上餘八十一又以上八十一除下九十四得一為第三數下餘一十三又以下一十三除上八十一得六為第四數上餘三又以上三除下一十三得四為第五數下餘一又以下一除上三得二為第六數上餘一得第一數一第二數一第三數一第四數六第五數四第六數二列左行乃立天元一為右行第一數以左行第一數一乘之得一為右行第二數又置右行第二數一以左行第二數一乘之得一加入右行第一數一得二為右行第三數又置右行第三數二以左行第三數一乘之得二加入右行第二數一得三為右行第四數又置右行第四數三以左行第四數六乘之得一十八加入右行第三數二得二十為右行第五數又置右行第五數二十以左行第五數四乘之得八十加入右行第四數三得八十三為右行第六數又置右行第六數八十三以左行第六數二乘之得一百六十六加入右行第五數二十得一百八十六為右行第七數即土
