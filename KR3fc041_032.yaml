body:
  text: 置各衍數各以定母除去之甲得二乙得一丙得一各為奇數視乙丙二位奇數皆得一不求乘率即以衍數為用數甲奇數二當求乘率依大衍求一術入之列甲奇數二於上甲定母三於下以上二除下三得一為第一數下餘一又以下一除上二得一為第二數須令有餘故一除二得一上餘一得第一數一第二數一列第一數一第二數一于左行立天元一為右行第一數以左行第一數一乘之得一為右行第二數又置右行第二數一以左行第二數一乘之得一加入右行第一數一得二為右行第三數即甲乘率
