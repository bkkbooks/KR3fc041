body:
  text: 草曰置乾一十兩坎二十兩艮三十兩震四十兩巽五十兩離六十兩坤七十兩兌八十兩各為全數用連環相約術約之先以乾一十與坎二十求等得一十以約乾一十得一乾既得一與艮震以下各位皆無等得乾一坎二十艮三十震四十巽五十離六十坤七十兌八十為第一變次以坎二十與艮三十求等得一十以約艮三十得三又以坎二十與震四十求等得二十以約坎二十得一坎既得一與下俱無等得乾一坎一艮三震四十巽五十離六十坤七十兌八十為第二變次以艮三與震四十求等得一不約又以艮三與巽五十求等亦得一不約又以艮三與離六十求等得三約艮三得一得乾一坎一艮一震四十巽五十離六十坤七十兌八十為第三變
  hash: sha256:3ca2a9e75e00d7c3ee479e5cd30d4a1694298aae13c7b8a4f9e0864d09153d88
