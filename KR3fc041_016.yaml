body:
  text: 何答曰甲八乙五丙二十七草曰先以甲二十四偶與乙三十偶求等得六偶以約乙得五奇此是令約得數爲奇又以甲二十四偶與丙五十四偶求等得六偶以約丙得九奇此亦是令約得數爲奇得甲二十四乙五丙九爲第一變又以乙五與丙九求等得一不約此第一變卽爲第二變又問數止三位此第二變卽爲泛母又置泛母以甲二十四與乙五求等得一不約又以甲二十四與丙九求等得三以約甲得八偶此反約法乘丙得二十七奇得甲八乙五丙二十七爲第一變又以乙五與丙二十七求等得一不約此第一變卽爲第二變亦卽爲定母合問今有甲數二十八乙數二十六丙數三十二問定母各幾何答曰甲七乙一十三丙三十二草曰以甲二十八偶與乙二十六偶求等得二偶以約乙得一十三奇又以甲二十八偶與丙三十二偶求等四偶以約甲得七奇得甲七乙一十三丙三十
