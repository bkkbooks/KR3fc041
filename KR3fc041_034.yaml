body:
  text: 以甲乘率二乘甲衍數三十五得七十為甲用數乙衍數二十一丙衍數一十五即為用數乃置元問賸數二三二亦列甲乙丙三位各乘用數甲得一百四十乙得六十三丙得三十各為總并各置總數以衍母一百五除去之餘二十三即物數也合問今有物不知其數四四數之賸一六六數之賸五八八數之賸一問物幾何答曰一十七草曰列元問全數四六八為甲乙丙三位依連環相約術約之先以甲四與乙六求等得二以約乙六得三四六皆偶數若約四得二仍是偶數則與六仍有等故約六得三為奇數即與四無等又以甲四與丙八求等得四以約甲四得一此所
