body:
  text: 多少兩數除之皆盡若不存一數並約一十五得五以兩約數五七相乘得三十五以多少兩數除之皆不能盡不可為總數故須存一數視兩數皆奇者奇謂一三五七九之類如意約之凡兩數皆奇所求之等必奇以約兩數必皆得奇故可如意約之案約分之法須令既約之後更無可約欲令無可約則必先令約得之數皆為奇數蓋兩奇或一奇一偶相約可以無等若兩偶相約則必有等故也一奇一偶者偶謂二四六八十之類則約奇凡兩數一奇一偶所求之等亦必奇以約奇數必得奇以約偶數必得偶今欲令約得為奇故約奇皆偶者則令約得數為奇凡兩數皆偶所求之等必偶以約兩數或皆得奇或一得奇一得偶故可令約得數為奇若約此得數與彼數有等則反約彼數有等須再約今反約彼數或可無等不必再約也今有多數二十一奇少數一十五奇等數三奇問當約何數答曰約二十一得七奇約一十五得五奇俱可今有多數九奇少數三奇等數三奇問當約何數答曰當約三得一奇此反約法也若約九得三則三與三仍有等今約三得一即一與九無等今有多數二十四偶少數二十一奇等數三奇問當約何數答曰當約二十一得七奇今有多數二十五奇少數一十偶等數五奇問當約何
