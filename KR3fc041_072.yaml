body:
  text: 置總數二億四千三百七十二萬一百五十滿衍母一百四十九萬五千二百去之餘二千五百五十卽江寧府距京里數置總里二千五百五十爲三位以甲日行一百七十八里除之得十四日一百七十八分日之五十八子母各半之得八十九分日之二十九爲甲到京日數以十四日減十五日餘一得甲起行爲初一日以乙日行二百二十四里除總里得十一日二百二十四分日之八十六子母各半之得一百一十二分日之四十三爲乙到京日數以十一日減十五日餘四得乙起行爲初四日以丙日行三百里除總里得八日三百分日之一百五十子母各以一百五十約之得二分日之一卽半日爲丙到京日數以八日減十五日餘七得丙起行爲初七日合問今有和豐永盈四字號廒米相等每廒各設臼舂米
