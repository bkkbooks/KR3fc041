body:
  text: 今有多數六少數四問等數幾何答曰二草曰置六於上四於下以下四除去上六上餘二又以上二除去下四適盡則上二為等數合問今有多數三少數二問等數幾何答曰一亦為無等一即是等數但以除多少消故為兩數皆仍為元數一除不無等草曰置三於上二於下以下二除去上三上餘一又以上一除去下二適盡則上一為等數合問約分既有等數則兩數中有重疊故須約之術曰置兩數以等數約一數存一數須存一數不約者為求總數故如下第一問多數二十一少數一十五約二十一得七存一十五不約以七乘一十五得百五為總數以
  hash: sha256:bad2b20b4c9156707bf3a955f75a308a8ecf799d314c117aa08397af113e2449
