body:
  text: 升八合豐得九十三石七升二合永得九十五石二斗三升二合盈得九十六石七斗六升八合各為舂過米數置舂過米數各以每臼容米除之和得一百四十四豐得一百六十八永得一百九十二盈得二百一十六各為舂過臼數又置每廒設臼數各以每日舂米二臼乘之和得十二豐得十四永得十六盈得十八各為每日舂臼數置各舂過臼數各以每日舂臼數除之皆得十二為各舂過日數合問今有後漢四分術木日率四千七百二十五火日率一千八百七十六土日率九千四百一十五金日率四千六百六十一水日率一千八百八十九熹平三年甲寅木日率餘五火日率餘七十五土日率餘四十金日率
