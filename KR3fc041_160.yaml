body:
  text: 四第六數一列左行立天元一為右行第一數以左行第一數四乘之得四為右行第二數又置右行第二數四以左行第二數九乘之得三十六加入右行第一數一得三十七為右行第三數又置右行第三數三十七以左行第三數一乘之得三十七加入右行第二數四得四十一為右行第四數又置右行第四數四十一以左行第四數一乘之得四十一加入右行第三數三十七得七十八為右行第五數又置右行第五數七十八以左行第五數四乘之得三百一十二加入右行第四數四十一得三百五十三為右行第六數又置右行第六數三百五十三以左行第六數一乘之得三百五十三加入右行第五數七十八得四百三十一為右行第七數即因率得等率六因率四百三十一蔀率一千二百一十五乃視天正冬至日辰庚午今欲令上元起己卯日則
  hash: sha256:d2dfc3f39d2d51d16e151a1faceff95f2a55bd05ad5c990eeabbf5e59a3ce4ad
