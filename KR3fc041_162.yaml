body:
  text: 爲大餘五十一以日法通大餘得三十七萬一千七百九十加入小餘一千一百七十得三十七萬二千九百六十爲元符三年庚辰氣應今欲令上元起庚辰歲卽從是年演之置氣應三十七萬二千九百六十以等率六乘紀法六十得三百六十爲約率約之得一千三十六以因率四百三十一乘之得四十四萬六千五百一十六滿蔀率一千二百一十五去之餘六百一十一以紀法六十乘之得三萬六千六百六十爲入元歲又置蔀率一千二百一十五以紀法六十乘之得七萬二千九百爲氣元率置入元歲三萬六千六百六十以朔實除去歲實餘七萬九千二百九十爲歲閏乘之得二十九億六千七十七萬一千四百滿朔實二十一萬五千二百七十八去之餘八萬七千八百四十四爲入閏置閏應五千六百二十二卽閏餘加入朔實得二十二萬九百以入閏減之餘一十三萬三千五十六爲閏縮又置氣元率七萬二千九百以歲閏乘之得五十七億八
