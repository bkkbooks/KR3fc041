body:
  text: 二為右行第二數又置右行第二數二以左行第二數二乘之得四加入右行第一數一得五為右行第三數即坤乘率次求兌乘率置兌奇數二十一於上兌定母四百於下以上二十一除下四百得十九為第一數下餘一又以下一除上二十一得二十為第二數上餘一即止不除得第一數十九第二數二十列左行乃立天元一為右行第一數以左行第一數十九乘之仍得十九為右行第二數又置右行第二數十九以左行第二數二十乘之得三百八十加入右行第一數一得三百八十一為右行第三數即兌乘率置離乘率一坤乘率五兌乘率三百八十一各乘衍數離乘率一即以衍數二千八百為離用數坤乘率五以乘坤衍數一千二百得六千為坤用數兌乘率三百八十一以乘兌衍數二十一得八千一為兌用數
