body:
  text: 二乘之得一百一十加入右行第四數一十四得一百二十四為右行第六數又置右行第六數一百二十四以左行第六數四乘之得四百九十六加入右行第五數五十五得五百五十一為右行第七數即木乘率次求火置火奇數五百二十七於上火定母一千八百七十六於下以上五百二十七除下一千八百七十六得三為第一數下餘二百九十五又以下二百九十五除上五百二十七得一為第二數上餘二百三十二又以上二百三十二除下二百九十五得一為第三數下餘六十三又以下六十三除上二百三十二得三為第四數上餘四十三又以上四十三除下六十三得一為第五數下餘二十又以下二十除上四十三得二為第六數上餘三又以上三除下二十得六為第七數下餘二又以下二除上三得一為第八數上餘一得第一數三第二數一第三數一第四數三第五數一第六數二第七數六第八數一列
