body:
  text: 一得一十七為右行第四數又置右行第四數一十七以左行第四數四乘之得六十八加入右行第三數四得七十二為右行第五數即甲乘率次求乙置乙奇數一百七十九於上乙定母二百二十四於下以上一百七十九除下二百二十四得一為第一數下餘四十五又以下四十五除上一百七十九得三為第二數上餘四十四又以上四十四除下四十五得一為第三數下餘一又以下一除上四十四得四十三為第四數上餘一即止不除得第一數一第二數三第三數一第四數四十三列左行乃立天元一為右行第一數以左行第一數一乘之仍得一為右行第二數又置右行第二數一以左行第二數三乘之仍得三加入右行第一數一得四為右行第三數又置右行第三數四以左行第三數一乘之得四加入右行第二數一得五為右行第四數又置右行第四數五以左行第四數四十三乘之得二百一十五加入右行第三數四得二百一十九為右行第五數即乙乘率
