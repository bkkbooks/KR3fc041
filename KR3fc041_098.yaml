body:
  text: 七千七十六為木衍數以火定母一千八百七十六除之得一萬五千九百八十七億五十一萬六百七十五為火衍數以土定母二百六十九除之得一十一萬一千四百九十三億一百七十萬二千七百為土衍數以金定母四千六百六十一除之得六千四百三十四億五千八百九十四萬八千三百為金衍數以水定母一千八百八十九除之得一萬五千八百七十六億九千八百三十三萬六千七百為水衍數置各衍數各以定母去之木餘六百二十六火餘五百二十七土餘一百七十五金餘二千五百六十六水餘五百七各為奇數
