body:
  text: 數三乘乙數五得一十五又以丙數七乘之得一百五卽丁衍數也合問其一草曰置衍母一千一百五十五爲四位以甲數三除之得三百八十五以乙數五除之得二百三十一以丙數七除之得一百六十五以丁數十一除之得一百五並與前同合問大衍求一以乘率乘少數滿多數去之必餘一一猶大衍之奇一故曰大衍求一術曰列少數於上多數於下以上除下所得爲第一數有餘復以下除上所得爲第二數如是上下相除所得以次命之如第三數第四數之類上位餘一如上位除盡卽減得數一爲餘一如上位五下位一常法以一除五得五除盡此術以一除五則爲得四餘一與常法不同卽止不除乃列各得數於左行立天元一爲右行第一數以左行第一數乘之得右行第二數此無上位可加故卽爲第二數復置右行第二數以左行第二數乘之如入右行第一數得右行第三數每置右行數以左行相當之數乘之謂第一第二位數相當以右行上位加之得右行次位如右行第三數卽以左行相當第三數乘之以右行上位第二數加之得右行次位第四數它仿此其右行最後得數卽乘率也右行位數恆多於左行一位如左行有四數右行卽有五數此第五數卽乘率也今有少數五多數六問乘率幾何
