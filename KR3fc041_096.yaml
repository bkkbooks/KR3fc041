body:
  text: 次以火一千八百七十六與土一千八百八十三求等得七以約土一千八百八十三得二百六十九又以火一千八百七十六與金四千六百六十一水一千八百八十九求等皆得一不約得木六百七十五火一千八百七十六土二百六十九金四千六百六十一水一千八百八十九為第二變此第二變各數皆無等即為定母以連環相乘術求衍母衍數置木定母六百七十五以火定母一千八百七十六乘之得一百二十六萬六千三百又以土定母二百六十九乘之得三億四千六十三萬四千七百又以金定母四千六百六十九乘之得一萬五千八百七十六億九千八百三十三萬六千七百又以水定母一千八百八十九乘之得二千九百九十九萬一千六百二十一億五千八百二萬六千三百為衍母案四分術曰日率相約取之得二千九百九十萬一千六百二十一億五十八萬二千三百而五星終即此衍母也今本九十下脫九字五十八萬二千當作五千八百二萬六千傳寫脫誤又置衍母五位以木定母六百七十五除之得四萬四千四百三十二億三百一十九萬
