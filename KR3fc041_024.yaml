body:
  text: 答曰五以乘率五乘少數五得二十五以多數六去之餘一草曰列五於上六於下以上五除下六得一為第一數下餘一又以下一除上五得四為第二數上餘一即止不除得第一數一第二數四列左行乃立天元一為右行第一數以左行第一數一乘之仍得一為右行第二數又置右行第二數一以左行第二數四乘之仍得四加入右行第一數一得五為右行第三數左行更無第三數無可對乘此右行第三數即為乘率合問今有少數五多數二十三問乘率幾何答曰一十四以乘率一十四乘少數五得七十以多數二十三去之餘一草曰列五於上二十三於下以上五除下二十三得四為第一數下餘三又以下三除上五得一為第二數上餘二又以上二除下三得一為第三數下餘一又以下一除上二得一為第四數上餘一即止不除得第一數四第二數一第三數一第四數一列左行乃立天元一為右行第一數以左行第一數乘之仍
