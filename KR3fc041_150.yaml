body:
  text: 以元閏朔實求得等數三以約元閏得六萬三千三百八十八為奇數以約朔實得一十萬四千二百四十三為蔀數依大衍求一術求因數列奇數六萬三千三百八十八於上蔀數一十萬四千二百四十三於下以上六萬三千三百八十八除下一十萬四千二百四十三得一為第一數下餘四萬八百五十五又以下四萬八百五十五除上六萬三千三百八十八得一為第二數上餘二萬二千五百三十三又以上二萬二千五百三十三除下四萬八百五十五得一為第三數下餘一萬八千三百二十二又以下一萬八千三百二十二除上二萬二千五百三十三得一為第四數上餘四千二百一十一又以上四千二百一十一除下一萬八千三百二十二得四為第五數下餘一千四百七十八又以下一千四百七十八除上四千二百一十一得二為第六數上餘一千二百五十五又以上一千二百五十五除下一千四百七十八得一為第七數下餘二百二十三又以下二百二十三除上一千二百五十五得五為第八數上餘一百四十又以上一百四十除下二百二十三得一為第九數下餘八十三又以下八十三除上一百
  hash: sha256:4962df9acf71c53eb64bfa58d6b51a1da92c40e26fe150d4b47248d2ddbd2cf0
