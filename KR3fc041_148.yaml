body:
  text: 七以因率一百八十四乘之得九萬一千四百四十八滿蔀率一千五十九去之餘三百七十四以紀法六十乘之得二萬二千四百四十為入元歲又置蔀率一千五十九以紀法六十乘之得六萬三千五百四十為氣元率置入元歲二萬二千四百四十以朔實除去歲實餘一十一萬五千二百九十二為歲閏乘之得二十五億八千四百九十萬八千四百八十滿朔實三十一萬二千七百二十九去之餘二十萬三千二百九十五為入閏置閏應一萬六千一百四十九加朔實得三十二萬八千八百七十八以入閏減之餘一十二萬五千五百八十三為閏縮又置氣元率六萬三千五百四十以歲閏乘之得七十二億一千九百二十九萬九千六百八十滿朔實去之餘一十九萬一百六十四為元閏
