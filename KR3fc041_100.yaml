body:
  text: 以大衍求一術各求乘率先求木置木奇數六百二十六於上木定母六百七十五於下以上六百二十六除下六百七十五得一為第一數下餘四十九又以下四十九除上六百二十六得一十二為第二數上餘三十八又以上三十八除下四十九得一為第三數下餘一十一又以下一十一除上三十八得三為第四數上餘五又以上五除下一十一得二為第五數下餘一又以下一除上五得四為第六數上餘一得第一數一第二數一十二第三數一第四數三第五數二第六數四列左行乃立天元一為右行第一數以左行第一數一乘之得一為右行第二數又置右行第二數一以左行第二數一十二乘之得一十二加入右行第一數一得一十三為右行第三數又置右行第三數一十三以左行第三數一乘之得一十三加入右行第二數一得一十四為右行第四數又置右行第四數一十四以左行第四數三乘之得四十二加入右行第三數一十三得五十五為右行第五數又置右行第五數五十五以左行第五數
