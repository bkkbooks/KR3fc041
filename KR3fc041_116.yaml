body:
  text: 乃置木日率餘五火日率餘七十五土日率餘四十金日率餘一百三十三水日率餘一十各爲賸數以各賸數各乘用數木得一兆二千二百四十一萬二百四十八億七百九十四萬四千三百八十火得七兆八千五百三十六萬一千六百二十五億八千六百九十萬九千三百七十五土得八兆二千九百五十萬八千四十六億六千八百八萬八千金得一十兆五千八百六十二萬五千九十六億三千三百二十六萬四千三百水得二兆六千三百二十四萬三百八十四億二千二百四十八萬六千各爲總并五總得三十兆五千九百一十四萬五千四百一億一千八百六十九萬二千五十五爲總數
