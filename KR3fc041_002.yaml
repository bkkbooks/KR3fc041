body:
  text: 一曰立天元一一曰求一盡方圓之變莫善於立天元一窮奇偶之情莫善於求一求一之術出於孺而算徑物不知數之問宋史藝文志有龍受益求一算術歌當即此術而其書不傳推步家謂之方程術義略所謂以方程約而齊之鮑浣之論統天術所謂虛廢方程之算者是也然其布算行列迥與方程不同則名之為方程者非也其法以各數及不滿各數之殘求未以各數除去之數必先求以各數去之餘一之數而後諸數可求故曰求一也算之用無所不包至於步天而極求一術之於步天其用尤為切要何者氣朔交轉之策即各數也氣朔交轉之應即不滿各數之殘也上元以來距所求年之積分即未以各數除去之數也是故由唐麟德術以下迄於宋元諸家演撰皆依賴是術而成立五代曹士蒍變古法不復推上古為元然世謂之小術祇行於民間元郭守敬造授時術斷取近距不用積年日法而李謙議仍有附演積數三法以釋或者之疑蓋臺官師説相傳罔敢失墜求一術之見重當時如此明用大統一切皆仍授時之舊鄭世子載堉所進萬年術亦依郭法截算不立積年上元之法久不行
