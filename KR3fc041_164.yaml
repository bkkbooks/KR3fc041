body:
  text: 千二十四萬一千滿朔實去之餘二萬六千七百爲元閏以元閏朔實求等數得二以約元閏得一萬三千三百五十爲奇數以約朔實得一十萬七千六百三十九爲蔀數依大衍求一術求因數列奇數一萬三千三百五十於上蔀數一十萬七千六百三十九於下以上一萬三千三百五十除下一十萬七千六百三十九得八爲第一數下餘八百三十九又以下八百三十九除上一萬三千三百五十得一十五爲第二數上餘七百六十五又以上七百六十五除下八百三十九得一爲第三數下餘七十四又以下七十四除上七百六十五得一十爲第四數上餘二十五又以上二十五除下七十四得二爲第五數下餘二十四又以下二十四除上二十五得一爲第六數上餘一卽止不除得第一數八第二數一十五第三數一第四數一十第五數二第六數一列左行立天元一爲右行第一數以左行第一數八乘之得八爲右行第二數又置右行第二數八以左行第二數一十五
