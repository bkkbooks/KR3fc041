body:
  text: 四十得一爲第十數上餘五十七又以上五十七除下八十三得一爲第十一數下餘二十六又以下二十六除上五十七得二爲第十二數上餘五又以上五除下二十六得五爲第十三數下餘一又以下一除上五得四爲第十四數上餘一得第一數一第二數一第三數一第四數一第五數四第六數二第七數一第八數五第九數一第十數一第十一數一第十二數二第十三數五第十四數四列左行立天元一爲右行第一數以左行第一數一乘之得一爲右行第二數又置右行第二數一以左行第二數一乘之得一加入右行第一數一得二爲右行第三數又置右行第三數二以左行第三數一乘之得二加入右行第二數一得三爲右行第四數又置右行第四數三以左行第四數一乘之得三加入右行第三數二得五爲右行第五數又置右行第五數五以左行第五數四乘之得二十加入右行第四數三得二十三爲右行第六數又置右行第六數二十三以左行第六數二乘之得四十六加入右行第五數五得五十一爲右行第七數又置右行第七數五十一以左行第七數一乘之得五十一加入右行第六數二十
