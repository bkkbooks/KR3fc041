body:
  text: 一萬六千八百得一百二十萬九千六百爲甲用數以乙乘率二百一十九乘乙衍數六千六百七十五得一百四十六萬一千八百二十五爲乙用數以丙乘率一十六乘丙衍數一萬九千九百三十六得三十一萬八千九百七十六爲丙用數乃置甲離京五十八里乙離京八十六里丙離京一百五十里各爲賸數置各賸數以乘各用數以甲賸數五十八乘甲用數一百二十萬九千六百得七千一十五萬六千八百爲甲總以乙賸數八十六乘乙用數一百四十六萬一千八百二十五得一億二千五百七十一萬六千九百五十爲乙總以丙賸數一百五十乘丙用數三十一萬八千九百七十六得四千七百八十四萬六千四百爲丙總并三總得二億四千三百七十二萬一百五十爲總數
