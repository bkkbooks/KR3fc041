body:
  text: 千六百九十九得四億九千五十一萬五千二百一爲盈用數乃置各餘米亦通爲合各滿全數去之和餘米一萬六千九百一十二合滿和全數五百七十七去之餘一百七十九爲和賸數豐餘米六千九百二十八合滿豐全數五百五十四去之餘二百八十爲豐賸數永餘米四千七百六十八合滿永全數四百九十六去之餘三百四爲永賸數盈餘米三千二百三十二合滿盈全數四百四十八去之餘九十六爲盈賸數以賸數各乘用數和賸數一百七十九乘和用數八
