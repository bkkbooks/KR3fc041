body:
  text: 陽城張敦仁重述今有乾坎艮震巽離坤兌八庫貯銀相等聽乾坎艮震巽離坤兌八項人各於當庫支用如乾項人於乾庫支用坎項人於坎庫支用是也乾每次支銀一十兩坎每次支銀二十兩艮每次支銀三十兩震每次支銀四十兩巽每次支銀五十兩離每次支銀六十兩坤每次支銀七十兩兌每次支銀八十兩今各不記支用次數但查驗餘銀乾庫餘九兩坎庫餘十九兩艮庫餘十九兩震庫餘十九兩巽庫餘九兩離庫餘十九兩坤庫餘六十九兩兌庫餘五十九兩問八庫貯銀數及八項人各支用次數幾何答曰每庫貯銀六千八百五十九兩乾支過六百八十五次坎支過三百四十二次艮支過二百二十八次震支過一百七十一次巽支過一百三十七次離支過一百一十四次坤支過九十七次兌支過八十五次
