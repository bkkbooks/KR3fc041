body:
  text: 次求豐置豐奇數四十三於上豐定母二百七十七於下以上四十三除下二百七十七得六爲第一數下餘一十九又以下一十九除上四十三得二爲第二數上餘五又以上五除下一十九得三爲第三數下餘四又以下四除上五得一爲第四數上餘一卽止不除得第一數六第二數二第三數三第四數一列左行乃立天元一爲右行第一數以左行第一數六乘之仍得六爲右行第二數又置右行第二數六以左行第二數二乘之得一十二加入右行第一數一得一十三爲右行第三數又置右行第三數一十三以左行第三數三乘之得三十九加入右行第二數六得四十五爲右行第四數又置右行第四數四十五以左行第四數一乘之仍得四十五加入右行第三數一十三得五十八爲右行第五數卽豐乘率次求永置永奇數二十六於上永定母三十一於下以上二十六除下三十一得一爲第一數下餘五又
