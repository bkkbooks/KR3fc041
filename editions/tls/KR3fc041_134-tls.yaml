body:
  text: 右行第二數又置右行第二數四以左行第二數一十乘之得四十加入右行第一數一得四十一爲右行第三數又置右行第三數四十一以左行第三數一乘之得四十一加入右行第二數四得四十五爲右行第四數又置右行第四數四十五以左行第四數一十二乘之得五百四十加入右行第三數四十一得五百八十一爲右行第五數又置右行第五數五百八十一以左行第五數一乘之得五百八十一加入右行第四數四十五得六百二十六爲右行第六數又置右行第六數六百二十六以左行第六數一乘之得六百二十六加入右行第五數五百八十一得一千二百七爲右行第七數卽因率得等率一因率一千二百七蔀率三千四十乃視天正冬至日辰戊寅今欲令上元起甲子日則爲大餘一十四以日法通大餘得四萬二千五百六
