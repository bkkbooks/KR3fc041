body:
  text: 和字廒設臼六隻每臼容米五斗七升七合豐字號設臼七隻每臼容米五斗五升四合永字號設臼八隻每臼容米四斗九升六合盈字號設臼九隻每臼容米四斗四升八合各廒每臼用舂夫一名舂夫每名每日舂米二臼四廒同日開舂各於每日清晨在廒取一日應舂米今盤驗餘米和字號餘十六石九斗一升二合豐字號餘六石九斗二升八合永字號餘四石七斗六升八合盈字號餘三石二斗三升二合問各廒共米及舂過米數臼數日數各幾何答曰共米一百石和舂過米八十三石八升八合計一百四十四臼一十二日盈舂過米九十三石七升二合計一百六十八臼一十二日永舂過米九十五石二斗三升二合計一百九十二臼一十二日盈舂過米九十六石七斗六升八合計二百一十六臼一十二日草曰置各臼容米並通爲合和得五百七十七合豐得五百五十四合永得四百九十六合盈得四百四
