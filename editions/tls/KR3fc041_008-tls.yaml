body:
  text: 今有多數六少數四問等數幾何答曰二草曰置六於上四於下以下四除去上六上餘二又以上二除去下四適盡則上二爲等數合問今有多數三少數二問等數幾何答曰一亦爲無等一卽是等數但以除多少消故爲兩數皆仍爲元數一除不無等草曰置三於上二於下以下二除去上三上餘一又以上一除去下二適盡則上一爲等數合問約分旣有等數則兩數中有重疊故須約之術曰置兩數以等數約一數存一數須存一數不約者爲求總數故如下第一問多數二十一少數一十五約二十一得七存一十五不約以七乘一十五得百五爲總數以
  hash: sha256:ae757c329c6ce118e44db69cf102f98772d1003c40e1d425c35715ae00cde27f
