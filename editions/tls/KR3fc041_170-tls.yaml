body:
  text: 日法二千一百九十乘之得七十九億九千八百八十一萬七百五十以日周一萬除之得七十九萬九千八百八十一爲今用歲實不盡七百五十棄之置歲實七十九萬九千八百八十一滿日法二千一百九十去之餘五百三十一爲斗分以日法斗分求得等率三以約日法得七百三十爲蔀率以約斗分得一百七十七爲奇率依大衍求一術求因率列奇率一百七十七於上蔀率七百三十於下以上一百七十七除下七百三十得四爲第一數下餘二十二又以下二十二除上一百七十七得八爲第二數上餘一卽止不除得第一數四第二數八列左行立天元一爲右行第一數以左行第一數四乘之得四爲右行第二數又置右行第二數四以左行第二數八乘之得三十二加入右行第一數一得三十三爲右行第三數卽因率得等率三因率三十三蔀率七百三十
  hash: sha256:fa64d3d7beb8bb59fb599c38426ef8891df7125e54f5d52f5a4f48022e28789c
