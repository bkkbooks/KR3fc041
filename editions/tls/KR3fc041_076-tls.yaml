body:
  text: 十八合各爲全數用連環相約術約之以和五百七十七與豐五百五十四永四百九十六盈四百四十八求等皆得一不約卽以全數爲第一變次以豐五百五十四與永四百九十六求等得二以約豐五百五十四得二百七十七又以豐二百七十七與盈四百四十八求等得一不約得和五百七十七豐二百七十七永四百九十六盈四百四十八爲第二變次以永四百九十六與盈四百四十八求等得一十六以約永四百九十六得三十一得和五百七十七豐二百七十七永三十一盈四百四十八爲第三變卽爲泛母視各數無等卽爲定母以連環相乘術求衍母衍數置和定母五百七十七以豐定母二百七十七乘之得一十五萬九千八百
