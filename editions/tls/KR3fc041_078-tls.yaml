body:
  text: 二十九又以永定母三十一乘之得四百九十五萬四千六百九十九又以盈定母四百四十八乘之得二十二億一千九百七十萬五千一百五十二爲衍母又置衍母四位以和定母除之得三百八十四萬六千九百七十六爲和衍數以豐定母二百七十七除之得八百一萬三千三百七十六爲豐衍數以永定母三十一除之得七千一百六十萬三千三百九十二爲永衍數以盈定母四百四十八除之得四百九十五萬四千六百九十九爲盈衍數置各衍數各以定母去之和得一百一十七豐得四十三永得二十六盈得二百六十七各爲奇數用大衍求一術各求乘率先求和置和奇數一百一十七於上和定母五百七十七於下以上一百一十
  hash: sha256:fe8d3991511a05e89226ec00cbe5d7ec562672d215cf33d58a1097f9cb4334df
