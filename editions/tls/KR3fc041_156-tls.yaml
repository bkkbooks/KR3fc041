body:
  text: 數得等數三因數八萬四千一百四十二蔀數一十萬四千二百四十三乃置閏縮一十二萬五千五百八十三以等數三約之得四萬一千八百六十一以因數八萬四千一百四十二乘之得三十五億二千二百二十六萬八千二百六十二滿蔀數一十萬四千二百四十三去之餘一千五百三十五爲乘元限數以乘氣元率六萬三千五百四十得九千七百五十三萬三千九百爲朔積年以入元歲二萬二千四百四十加之得九千七百五十五萬六千三百四十卽上元甲子至天聖二年甲子積算也合問
