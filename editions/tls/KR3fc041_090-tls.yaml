body:
  text: 億三千四百七十九萬三千七百九十二得一千四百九十四億二千八百八萬八千七百六十八爲和總以豐賸數二百八十乘豐用數四億六千四百七十七萬五千八百八得一千三百一億三千七百二十二萬六千二百四十爲豐總以永賸數三百四乘永用數四億二千九百六十二萬三百五十二得一千三百六億四百五十八萬七千八爲永總以盈賸數九十六乘盈用數四億九千五十一萬五千二百一得四百七十億八千九百四十五萬九千二百九十六爲盈總并四總得四千五百七十二億五千九百三十六萬一千三百一十二爲總數置總數四千五百七十二億五千九百三十六萬一千三百一十二滿衍母二十二億一千九百七十萬五千一百五十二去之餘一十萬合命爲一百石卽每廒共米置共米各以餘米減之和得八十三石八
