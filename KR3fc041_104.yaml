body:
  text: 左行乃立天元一為右行第一數以左行第一數三乘之得三為右行第二數又置右行第二數三以左行第二數一乘之得三加入右行第一數一得四為右行第三數又置右行第三數四以左行第三數一乘之得四加入右行第二數三得七為右行第四數又置右行第四數七以左行第四數三乘之得二十一加入右行第三數四得二十五為右行第五數又置右行第五數二十五以左行第五數一乘之得二十五加入右行第四數七得三十二為右行第六數又置右行第六數三十二以左行第六數二乘之得六十四加入右行第五數二十五得八十九為右行第七數又置右行第七數八十九以左行第七數六乘之得五百三十四加入右行第六數三十二得五百六十六為右行第八數又置右行第八數五百六十六以左行第八數一乘之得五百六十六加入右行第七數八十九得六百五十五為右行第九數即火乘率
