body:
  text: 用於是古人所以推求七曜齊同之故五百年來無有知其説者矣國朝數學昌明邁越千古潛心九九之士後先相望立天元術見於元李敬齋治益古演段測圓海鏡者唐荆川顧箬溪諸君已不解為何物及宣城梅文穆公以西洋借根方釋之其術復大顯獨求一術廑見於宋秦九韶道古數學九章中學者罕見其書知之者鮮余宦遊江右上交學使李雲門先生借録所藏秦李諸書乃得窺尋立天元一求一之妙及來吳門有元和諸生李尚之鋭篤好斯言因共日夕討論研窮祕奧官曹多暇輒依秦氏所説略加修節推而衍之得書一卷名曰求一算術以篇帙稍繁分為上中下上以究其原中下以明其法中為雜法下則演紀也竊謂隨時測驗以明合天則演撰之法不可復用上考往古求其已然則算造之原不可不知况乎術體精微未易窺測秦氏自言窮年致志感於夢寐幸而得知神明變化存乎其人又安知無用之用其用不有更大者在乎此則區區之心所以自矜一得之愚亟思有以章明之也嘉慶八年歲在癸亥三月十六日立夏節陽城張敦仁敘蘇州寓館之藝學軒
