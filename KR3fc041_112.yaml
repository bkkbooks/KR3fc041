body:
  text: 上五百七得一為第二數上餘一百三十九又以上一百三十九除下三百六十八得二為第三數下餘九十又以下九十除上一百三十九得一為第四數上餘四十九又以上四十九除下九十得一為第五數下餘四十一又以下四十一除上四十九得一為第六數上餘八又以上八除下四十一得五為第七數下餘一又以下一除上八得七為第八數上餘一得第一數三第二數一第三數二第四數一第五數一第六數一第七數五第八數七列左行乃立天元一為右行第一數以左行第一數三乘之得三為右行第二數又置右行第二數三以左行第二數一乘之得三加入右行第一數一得四為右行第三數又置右行第三數四以左行第三數二乘之得八加入右行第二數三得一十一為右行第四數又置右行第四數一十一以左行第四數一乘之得一十一加入右行第三數四得一十五為右行第五數又置右行第五數一十五以左行第五數一乘之得一十五加入右行第四數一十一得二十六為右行第六數又置右行第六數二十六以左行第六數一乘之得二十六加入右行第五數一十五得四十一為右行
