body:
  text: 約得亦是奇數又以乙三即用約得數與丙八求等得一不約約畢得甲一乙三丙八各為定母又甲定母止有一即減去甲位不用案秦氏元法定母一者有借用數之法又云或欲從省勿借任之為空是借用法本可不立輾轉補綴易滋學者之惑故此術直削去不用但以乙三丙八為各定母以後只二位以乙丙入算又依連環相乘術求衍母衍數以乙定母三乘丙定母八得二十四為衍母列衍母為二位各以定母除之乙得八即定母丙得三即乙定母各為衍數置各衍數以各定母除去之乙得二丙不滿定母即為得三各為奇數各置定母奇數依大衍求一術入之先求乙乘率列乙奇數二於上乙定母三於下以上除下得一為第一數下餘一又以下一除上二得一為第二數上餘一得第一數一第一數一
