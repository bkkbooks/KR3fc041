body:
  text: 餘一百三十三水日率餘一十此各日率所餘即是置上元盡熹平三年積算以各日率除去所餘之數問上元以來盡熹平三年甲寅積歲幾何及上元太歲所在答曰積九千四百五十五歲上元太歲在庚辰草曰置木日率四千七百二十五火日率一千八百七十六土日率九千四百一十五金日率四千六百六十一水日率一千八百八十九各為全數用連環相約術約之以木四千七百二十五與火一千八百七十六求等得七以約木四千七百二十五得六百七十五又以木六百七十五與土九千四百一十五求等得五以約土九千四百一十五得一千八百八十三又以木六百七十五與金四千六百六十一水一千八百八十九求等皆得一不約得木六百七十五火一千八百七十六土一千八百八十三金四千六百六十一水一千八百八十九為第一變
