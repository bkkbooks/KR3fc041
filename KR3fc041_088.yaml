body:
  text: 千六百九十九得四億九千五十一萬五千二百一為盈用數乃置各餘米亦通為合各滿全數去之和餘米一萬六千九百一十二合滿和全數五百七十七去之餘一百七十九為和賸數豐餘米六千九百二十八合滿豐全數五百五十四去之餘二百八十為豐賸數永餘米四千七百六十八合滿永全數四百九十六去之餘三百四為永賸數盈餘米三千二百三十二合滿盈全數四百四十八去之餘九十六為盈賸數以賸數各乘用數和賸數一百七十九乘和用數八
