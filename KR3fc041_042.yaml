body:
  text: 又依連環相乘術求衍數衍母以甲五乘乙七得三十五又以丙九乘之得三百一十五為衍母又以乙七乘丙九得六十三為甲衍數以甲五乘丙九得四十五為乙衍數以甲五乘乙七得三十五為丙衍數置各衍數各以定母去之甲餘三乙餘三丙餘八各為奇數依大衍求一術求乘率先求甲列甲奇數三於上甲定母五於下以上三除下五得一為第一數下餘二又以下二除上三得一為第二數上餘一即止不除得第一數一第二數一列第一數一第二數一於左行立天元一為右行第一數以左行第一數一乘之得一為右行第二數又置右行第二數一以左行第二數一乘之得一加入右行第一數得二為右行第三數即甲乘率
