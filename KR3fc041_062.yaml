body:
  text: 丙行八日半於初七日起行草曰置甲行一百七十八里乙行二百四十四里丙行三百里各爲全數全數用連環相約術約之先以甲一百七十八與乙二百二十四求等得二以約甲得八十九又以甲八十九與丙三百求等得一不約得甲八十九乙二百二十四丙三百爲第一變次以乙二百二十四與丙三百求等得四以約丙三百得七十五得甲八十九乙二百二十四丙七十五爲第二變視甲乙丙俱無等數卽爲定母置定母用連環相乘術求之以乙二百二十四乘甲八十九得一萬九千九百三十六又以丙七十五乘之得一百四十九萬五千二百爲衍母置衍母爲三位以甲八十九除之得一萬六千八百爲甲衍數以乙二百二十四除之得六千六百七十五爲乙衍數
  hash: sha256:ae347a94549b878653a469ac95d5f2ef6a3a13fa5421c3b48305ca7336ee9ffa
