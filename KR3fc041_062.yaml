body:
  text: 丙行八日半於初七日起行草曰置甲行一百七十八里乙行二百四十四里丙行三百里各為全數全數用連環相約術約之先以甲一百七十八與乙二百二十四求等得二以約甲得八十九又以甲八十九與丙三百求等得一不約得甲八十九乙二百二十四丙三百為第一變次以乙二百二十四與丙三百求等得四以約丙三百得七十五得甲八十九乙二百二十四丙七十五為第二變視甲乙丙俱無等數即為定母置定母用連環相乘術求之以乙二百二十四乘甲八十九得一萬九千九百三十六又以丙七十五乘之得一百四十九萬五千二百為衍母置衍母為三位以甲八十九除之得一萬六千八百為甲衍數以乙二百二十四除之得六千六百七十五為乙衍數
  hash: sha256:7ce9f61c9b9f9c06fa3eaef6cc6ab65f54d330e81a34fdae697df7dbf0e4040a
