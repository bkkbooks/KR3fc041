body:
  text: 次以震四十與巽五十求等得一十以約震四十得四此反約法又以震四與離六十求等得四以約離六十得一十五又以震四與坤七十求等得二以約坤七十得三十五又以震四與兌八十求等得四以約震四得一得乾一坎一艮一震一巽五十離一十五坤三十五兌八十為第四變次以巽五十與離一十五求等得五以約離一十五得三又以巽五十與坤三十五求等得五以約坤三十五得七又以巽五十與兌八十求等得一十以約巽五十得五得乾一坎一艮一震一巽五離三坤七兌八十為第五變次以離三與坤七兌八十求等皆得一不約此第五變即為第六次以坤七與兌八十求等得一不約此第五變即為第七變泛母有八位故有七變又置泛母如前求等皆得一惟巽五與兌八十求等
