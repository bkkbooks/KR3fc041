body:
  text: 千六百七十二得八萬四千八百八十以入閏五萬九千五百六十減之餘二萬五千三百二十為閏縮又置氣元率四萬三千八百以歲閏乘之得一十億四千三百一十八萬四千六百滿朔實六萬四千六百七十二去之餘二萬五千二百四十為元閏以元閏朔實求得等數八以約元閏得三千一百五十五為奇數以約朔實得八千八十四為蔀數依大衍求一術求因數列奇數三千一百五十五於上蔀數八千八十四於下以上三千一百五十五除下八千八十四得二為第一數下餘一千七百七十四又以下一千七百七十四除上三千一百五十五得一為第二數上餘一千三百八十一又以上一千三百八十一除下一千七百七十四得一為第三數下餘三百九十三又以下三百九十三除上一千三百八十一得三為第四數上餘二百二又以上二百二除下三百九十三得一為第五數下餘一百九十一又以下一百九十一除上二百二得一為第六數上餘一十一又以上一十一除下一百九十一得一十七
  hash: sha256:7573270e43e66aa8d001092cc18c0f5c85dd9bed57226492a7f980a0fb3d77ce
